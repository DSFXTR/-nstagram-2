<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialPro | Video Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .story-gradient {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            padding: 2px;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #fafafa; }
        /* Video karartma efekti (Opsiyonel) */
        video { background-color: #000; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-200 px-4 py-3 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tighter">SocialPro</h1>
        <div class="flex space-x-6 text-xl">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-regular fa-paper-plane"></i>
        </div>
    </header>

    <div class="bg-white border-b border-gray-200 py-4 overflow-x-auto flex space-x-4 px-4 hide-scrollbar">
        <div class="flex flex-col items-center space-y-1 flex-shrink-0">
            <div class="relative w-16 h-16">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Doruk" class="rounded-full border-2 border-white bg-gray-100">
                <div class="absolute bottom-0 right-0 bg-blue-500 text-white rounded-full p-0.5 border-2 border-white">
                    <i class="fa-solid fa-plus text-[10px]"></i>
                </div>
            </div>
            <span class="text-xs font-medium">Hikayen</span>
        </div>
        <div class="flex flex-col items-center space-y-1 flex-shrink-0">
            <div class="story-gradient rounded-full">
                <img src="https://i.pravatar.cc/150?u=12" class="w-16 h-16 rounded-full border-2 border-white">
            </div>
            <span class="text-xs">aslan_haber</span>
        </div>
        <div class="flex flex-col items-center space-y-1 flex-shrink-0">
            <div class="story-gradient rounded-full">
                <img src="https://i.pravatar.cc/150?u=44" class="w-16 h-16 rounded-full border-2 border-white">
            </div>
            <span class="text-xs">teknoloji_merkezi</span>
        </div>
    </div>

    <main class="max-w-lg mx-auto p-0 md:p-4">
        
        <article class="bg-white mb-6 border border-gray-200 rounded-sm shadow-sm">
            <div class="flex justify-between items-center p-3">
                <div class="flex items-center space-x-3">
                    <img src="https://i.pravatar.cc/150?u=44" class="w-8 h-8 rounded-full">
                    <span class="text-sm font-bold">teknoloji_merkezi</span>
                </div>
                <i class="fa-solid fa-ellipsis"></i>
            </div>
            
            <div class="relative w-full aspect-square bg-black flex items-center">
                <video id="postVideo" class="w-full h-full object-cover" autoplay muted loop playsinline>
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-software-developer-working-on-code-screen-close-up-1728-large.mp4" type="video/mp4">
                    Tarayıcınız video oynatmayı desteklemiyor.
                </video>
                <button onclick="toggleMute()" class="absolute bottom-4 right-4 bg-black/50 text-white w-8 h-8 rounded-full flex items-center justify-center">
                    <i id="muteIcon" class="fa-solid fa-volume-xmark text-xs"></i>
                </button>
            </div>

            <div class="p-4">
                <div class="flex justify-between items-center mb-2 text-2xl">
                    <div class="flex space-x-4">
                        <button onclick="likeEffect(this)"><i class="fa-regular fa-heart hover:text-red-500"></i></button>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <i class="fa-regular fa-bookmark"></i>
                </div>
                <p class="font-bold text-sm mb-1">8.210 görüntülenme</p>
                <p class="text-sm"><span class="font-bold">teknoloji_merkezi</span> Geleceğin kodlarını bugünden yazıyoruz! 💻 #yazilim #socialapp #kod</p>
            </div>
        </article>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around items-center py-3 text-2xl z-50">
        <i class="fa-solid fa-house"></i>
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-regular fa-square-plus"></i>
        <i class="fa-solid fa-clapperboard text-gray-400"></i>
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Doruk" class="w-7 h-7 rounded-full border">
    </nav>

    <script>
        // Ses açma/kapatma simülasyonu
        function toggleMute() {
            const video = document.getElementById('postVideo');
            const icon = document.getElementById('muteIcon');
            video.muted = !video.muted;
            if(video.muted) {
                icon.classList.replace('fa-volume-high', 'fa-volume-xmark');
            } else {
                icon.classList.replace('fa-volume-xmark', 'fa-volume-high');
            }
        }

        // Beğeni efekti
        function likeEffect(btn) {
            const icon = btn.querySelector('i');
            icon.classList.toggle('fa-regular');
            icon.classList.toggle('fa-solid');
            icon.classList.toggle('text-red-500');
            if(icon.classList.contains('fa-solid')) {
                icon.style.transform = "scale(1.2)";
                setTimeout(() => icon.style.transform = "scale(1)", 100);
            }
        }
    </script>
</body>
</html>
