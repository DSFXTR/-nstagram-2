<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialPro Ultra | Doruk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .story-ring { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2px; }
        .page { display: none; min-height: 100vh; }
        .active-page { display: block; }
        /* Hikaye Katmanı */
        #storyOverlay { display:none; position:fixed; inset:0; background:black; z-index:100; }
        .progress-bar { height:3px; background:rgba(255,255,255,0.3); width:90%; margin:10px auto; border-radius:10px; overflow:hidden; }
        .progress-fill { height:100%; background:white; width:0%; transition: width 0.1s linear; }
        /* Kamera Filtreleri */
        .filter-none { filter: none; }
        .filter-bw { filter: grayscale(1); }
        .filter-sepia { filter: sepia(1); }
        .filter-invert { filter: invert(1) hue-rotate(180deg); }
        .filter-funny { filter: hue-rotate(90deg) saturate(3); }
    </style>
</head>
<body class="bg-gray-50 pb-20 overflow-x-hidden">

    <div id="storyOverlay">
        <div class="progress-bar"><div id="storyFill" class="progress-fill"></div></div>
        <div class="flex items-center p-4 space-x-3 text-white">
            <img id="storyUserImg" src="" class="w-8 h-8 rounded-full border">
            <span id="storyUserName" class="font-bold text-sm"></span>
            <button onclick="closeStory()" class="ml-auto text-2xl">&times;</button>
        </div>
        <div class="h-[70vh] flex items-center justify-center">
            <img id="storyContent" src="" class="max-h-full object-contain">
        </div>
    </div>

    <div id="cameraPage" class="page bg-black text-white">
        <div class="p-4 flex justify-between items-center">
            <i class="fa-solid fa-xmark text-2xl" onclick="switchTab('homePage')"></i>
            <span class="font-bold">HİKAYE OLUŞTUR</span>
            <i class="fa-solid fa-gear text-2xl"></i>
        </div>
        <div class="relative w-full aspect-[9/16] bg-gray-900 overflow-hidden">
            <video id="webcam" autoplay playsinline class="w-full h-full object-cover filter-none"></video>
            <div class="absolute bottom-10 left-0 w-full flex justify-center space-x-4 px-4 overflow-x-auto py-4">
                <button onclick="setFilter('filter-none')" class="w-12 h-12 rounded-full border-2 border-white bg-gray-500/50">Normal</button>
                <button onclick="setFilter('filter-bw')" class="w-12 h-12 rounded-full border-2 border-white bg-gray-800">S/B</button>
                <button onclick="setFilter('filter-funny')" class="w-12 h-12 rounded-full border-2 border-white bg-pink-500">Komik</button>
                <button onclick="setFilter('filter-invert')" class="w-12 h-12 rounded-full border-2 border-white bg-green-500">Uzaylı</button>
            </div>
        </div>
        <div class="flex justify-center mt-10">
            <div class="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center">
                <div class="w-16 h-16 bg-white rounded-full"></div>
            </div>
        </div>
    </div>

    <div id="homePage" class="page active-page">
        <header class="sticky top-0 z-50 bg-white border-b px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">SocialPro</h1>
            <div class="flex space-x-5 text-xl"><i class="fa-regular fa-heart"></i><i class="fa-regular fa-paper-plane"></i></div>
        </header>

        <div class="bg-white border-b py-4 overflow-x-auto flex space-x-4 px-4 no-scrollbar">
            <div onclick="openStory('Galatasaray', 'https://i.pravatar.cc/150?u=gs', 'https://images.unsplash.com/photo-1574629810360-7efbbe195018')" class="flex flex-col items-center flex-shrink-0 cursor-pointer">
                <div class="story-ring rounded-full"><img src="https://i.pravatar.cc/150?u=gs" class="w-16 h-16 rounded-full border-2 border-white"></div>
                <span class="text-xs mt-1">galatasaray</span>
            </div>
            <div onclick="openStory('Kod Evi', 'https://i.pravatar.cc/150?u=tech', 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97')" class="flex flex-col items-center flex-shrink-0 cursor-pointer">
                <div class="story-ring rounded-full"><img src="https://i.pravatar.cc/150?u=tech" class="w-16 h-16 rounded-full border-2 border-white"></div>
                <span class="text-xs mt-1">kod_evi</span>
            </div>
        </div>

        <main class="max-w-lg mx-auto">
             <article class="bg-white border-b mb-2">
                <div class="flex items-center p-3 font-bold text-sm"><img src="https://i.pravatar.cc/150?u=44" class="w-8 h-8 rounded-full mr-2"> <span>teknoloji_kanali</span></div>
                <video src="https://assets.mixkit.co/videos/preview/mixkit-software-developer-working-on-code-screen-close-up-1728-large.mp4" autoplay muted loop class="w-full aspect-square object-cover"></video>
            </article>
        </main>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center py-3 text-2xl z-[60]">
        <i class="fa-solid fa-house" onclick="switchTab('homePage')"></i>
        <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
        <i class="fa-solid fa-square-plus text-blue-500" onclick="startCamera()"></i>
        <i class="fa-solid fa-clapperboard text-gray-400"></i>
        <div class="w-7 h-7 rounded-full border overflow-hidden"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Doruk"></div>
    </nav>

    <script>
        // Sayfa Değiştirme
        function switchTab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            if(id !== 'cameraPage') stopCamera();
        }

        // --- HİKAYE SİSTEMİ ---
        let storyTimer;
        function openStory(name, userImg, contentImg) {
            const overlay = document.getElementById('storyOverlay');
            const fill = document.getElementById('storyFill');
            document.getElementById('storyUserName').innerText = name;
            document.getElementById('storyUserImg').src = userImg;
            document.getElementById('storyContent').src = contentImg;
            
            overlay.style.display = 'block';
            let width = 0;
            fill.style.width = '0%';
            
            storyTimer = setInterval(() => {
                width += 2;
                fill.style.width = width + '%';
                if(width >= 100) closeStory();
            }, 100);
        }
        function closeStory() {
            clearInterval(storyTimer);
            document.getElementById('storyOverlay').style.display = 'none';
        }

        // --- KAMERA VE EFEKT SİSTEMİ ---
        let stream;
        async function startCamera() {
            switchTab('cameraPage');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('webcam').srcObject = stream;
            } catch (err) {
                alert("Kameraya erişilemedi: " + err);
            }
        }
        function stopCamera() {
            if(stream) stream.getTracks().forEach(track => track.stop());
        }
        function setFilter(filterClass) {
            const video = document.getElementById('webcam');
            video.className = 'w-full h-full object-cover ' + filterClass;
        }
    </script>
</body>
</html>
