<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialApp Pro | Doruk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .story-ring { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); padding: 2px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body class="bg-[#fafafa] pb-20">

    <div id="homePage" class="page active-page">
        <header class="sticky top-0 z-50 bg-white border-b px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter">SocialPro</h1>
            <div class="flex space-x-5 text-xl">
                <i class="fa-regular fa-heart"></i>
                <i class="fa-regular fa-paper-plane"></i>
            </div>
        </header>

        <div class="bg-white border-b py-4 overflow-x-auto flex space-x-4 px-4 hide-scrollbar">
            <div class="flex flex-col items-center flex-shrink-0"><div class="story-ring rounded-full"><img src="https://i.pravatar.cc/150?u=1" class="w-16 h-16 rounded-full border-2 border-white"></div><span class="text-xs">aslan_yolu</span></div>
            <div class="flex flex-col items-center flex-shrink-0"><div class="story-ring rounded-full"><img src="https://i.pravatar.cc/150?u=2" class="w-16 h-16 rounded-full border-2 border-white"></div><span class="text-xs">kod_ustasi</span></div>
            <div class="flex flex-col items-center flex-shrink-0"><div class="story-ring rounded-full"><img src="https://i.pravatar.cc/150?u=3" class="w-16 h-16 rounded-full border-2 border-white"></div><span class="text-xs">gezi_rehberi</span></div>
        </div>

        <main class="max-w-lg mx-auto">
            <article class="bg-white border-b border-gray-200 mb-2">
                <div class="flex items-center p-3 space-x-3 text-sm font-bold">
                    <img src="https://i.pravatar.cc/150?u=2" class="w-8 h-8 rounded-full"> <span>kod_ustasi</span>
                </div>
                <video src="https://assets.mixkit.co/videos/preview/mixkit-working-at-a-computer-screen-close-up-33436-large.mp4" class="w-full aspect-square object-cover" autoplay muted loop playsinline></video>
                <div class="p-4">
                    <div class="flex space-x-4 text-2xl mb-2">
                        <i class="fa-regular fa-heart cursor-pointer hover:text-red-500" onclick="toggleLike(this)"></i>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <p class="text-sm"><b>kod_ustasi</b> Bugün de uygulamayı geliştiriyoruz! 🚀 #coding</p>
                </div>
            </article>

            <article class="bg-white border-b border-gray-200 mb-2">
                <div class="flex items-center p-3 space-x-3 text-sm font-bold">
                    <img src="https://i.pravatar.cc/150?u=1" class="w-8 h-8 rounded-full"> <span>aslan_yolu</span>
                </div>
                <img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&w=800&q=80" class="w-full aspect-square object-cover">
                <div class="p-4">
                    <div class="flex space-x-4 text-2xl mb-2">
                        <i class="fa-regular fa-heart cursor-pointer" onclick="toggleLike(this)"></i>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <p class="text-sm"><b>aslan_yolu</b> Maç günü heyecanı! 🦁 #galatasaray</p>
                </div>
            </article>
        </main>
    </div>

    <div id="profilePage" class="page">
        <header class="p-4 border-b bg-white flex justify-between items-center sticky top-0">
            <span class="font-bold text-lg">doruk_seyrek</span>
            <i class="fa-solid fa-bars text-xl"></i>
        </header>
        <div class="p-4 bg-white">
            <div class="flex items-center justify-between mb-6">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Doruk" class="w-20 h-20 rounded-full border p-1">
                <div class="flex space-x-6 text-center">
                    <div><p class="font-bold">12</p><p class="text-xs text-gray-500">Gönderi</p></div>
                    <div><p class="font-bold">850</p><p class="text-xs text-gray-500">Takipçi</p></div>
                    <div><p class="font-bold">120</p><p class="text-xs text-gray-500">Takip</p></div>
                </div>
            </div>
            <h2 class="font-bold">Doruk Seyrek</h2>
            <p class="text-sm text-gray-600 mb-4">Müzisyen | Developer 🎸👨‍💻 <br> Kasım Ekenler Ortaokulu</p>
            <button class="w-full bg-gray-100 font-semibold py-2 rounded-lg text-sm">Profili Düzenle</button>
        </div>
        <div class="grid grid-cols-3 gap-1 mt-2">
            <div class="aspect-square bg-gray-200"><img src="https://picsum.photos/200?random=1" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-200"><img src="https://picsum.photos/200?random=2" class="w-full h-full object-cover"></div>
            <div class="aspect-square bg-gray-200"><img src="https://picsum.photos/200?random=3" class="w-full h-full object-cover"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around items-center py-3 text-2xl z-50">
        <button onclick="showPage('homePage')"><i class="fa-solid fa-house"></i></button>
        <button><i class="fa-solid fa-magnifying-glass text-gray-400"></i></button>
        <button><i class="fa-regular fa-square-plus text-gray-400"></i></button>
        <button><i class="fa-solid fa-clapperboard text-gray-400"></i></button>
        <button onclick="showPage('profilePage')">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Doruk" class="w-7 h-7 rounded-full border">
        </button>
    </nav>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            window.scrollTo(0, 0);
        }

        function toggleLike(icon) {
            icon.classList.toggle('fa-regular');
            icon.classList.toggle('fa-solid');
            icon.classList.toggle('text-red-500');
        }
    </script>
</body>
</html>
